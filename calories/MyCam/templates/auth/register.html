{% extends "base.html" %}
{% block title %}Sign up · MyCam{% endblock %}
{% block content %}
<div class="mc-auth">
  <div class="mc-auth__card">
    <h3 class="mb-1">Create account</h3>
    <p class="text-muted mb-4">Start your AI-powered nutrition journey</p>
    <form id="regForm" autocomplete="on">
      <div class="mb-3">
        <label class="form-label">Nickname</label>
        <input type="text" name="nickname" class="form-control form-control-lg" />
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control form-control-lg" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Password (min. 6 characters)</label>
        <input type="password" name="password" class="form-control form-control-lg" minlength="6" required />
      </div>
      <button class="mc-btn-primary w-100" type="submit">Sign up & sign in</button>
    </form>
    <p class="text-center mt-3 small text-muted">
      Already have an account?<a href="{{ url_for('auth.login_page') }}">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('regForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  try {
    await axios.post('/api/auth/register', Object.fromEntries(fd));
    location.href = '/dashboard/';
  } catch (err) {
    Swal.fire({ icon: 'error', title: 'Sign-up failed', text: err.response?.data?.error?.message || err.message });
  }
});
</script>
{% endblock %}
