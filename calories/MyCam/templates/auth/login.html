{% extends "base.html" %}
{% block title %}Sign in · MyCam{% endblock %}
{% block content %}
<div class="mc-auth">
  <div class="mc-auth__card">
    <h3 class="mb-1">Welcome back</h3>
    <p class="text-muted mb-4">Sign in to MyCam to keep tracking your nutrition</p>
    <form id="loginForm" autocomplete="on">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control form-control-lg" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control form-control-lg" required />
      </div>
      <button class="mc-btn-primary w-100" type="submit">Sign in</button>
    </form>
    <p class="text-center mt-3 small text-muted">
      No account yet?<a href="{{ url_for('auth.register_page') }}">Sign up</a>
    </p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const payload = Object.fromEntries(fd);
  try {
    await axios.post('/api/auth/login', payload);
    location.href = '/dashboard/';
  } catch (err) {
    const errObj = err.response?.data?.error || {};
    const code = errObj.code || '';
    const msg = errObj.message || err.message;
    // Bad credentials → offer to register instead with email pre-filled
    if (code === 'BAD_CREDENTIALS') {
      const res = await Swal.fire({
        icon: 'info',
        title: "Hmm, can't sign you in",
        html: 'Either your password is wrong, or there\'s no account with <b>' + payload.email + '</b> yet.<br><br>Want to create one?',
        showCancelButton: true,
        confirmButtonText: 'Create account',
        cancelButtonText: 'Try again',
        confirmButtonColor: '#6e3aff',
      });
      if (res.isConfirmed) {
        const url = new URL('{{ url_for("auth.register_page") }}', location.origin);
        url.searchParams.set('email', payload.email);
        location.href = url.toString();
      }
    } else {
      Swal.fire({ icon: 'error', title: 'Sign-in failed', text: msg });
    }
  }
});
</script>
{% endblock %}
