{% extends "base.html" %}
{% block title %}Sign in · MyCam{% endblock %}
{% block content %}
<div class="mc-auth">
  <div class="mc-auth__card">
    <h3 class="mb-1">Welcome back</h3>
    <p class="text-muted mb-4">Sign in to MyCam to keep tracking your nutrition</p>
    <form id="loginForm" autocomplete="on">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control form-control-lg" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control form-control-lg" required />
      </div>
      <button class="mc-btn-primary w-100" type="submit">Sign in</button>
    </form>
    <p class="text-center mt-3 small text-muted">
      No account yet?<a href="{{ url_for('auth.register_page') }}">Sign up</a>
    </p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  try {
    await axios.post('/api/auth/login', Object.fromEntries(fd));
    location.href = '/dashboard/';
  } catch (err) {
    Swal.fire({ icon: 'error', title: 'Sign-in failed', text: err.response?.data?.error?.message || err.message });
  }
});
</script>
{% endblock %}
