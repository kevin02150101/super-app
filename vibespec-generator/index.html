
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeSpec Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --page-bg: #f3f8ff;
            --page-text: #0f1a2f;
            --bar-bg: rgba(243,248,255,0.88);
            --bar-border: rgba(30,150,229,0.18);
            --ink-soft: rgba(15,26,47,0.72);
            --ink-mute: rgba(15,26,47,0.46);
            --paper-soft: rgba(15,26,47,0.06);
            --surface-bg: rgba(255,255,255,0.70);
            --accent: #1e96e5;
            --accent-2: #3bcfff;
            --glow-1: rgba(30,150,229,0.15);
            --glow-2: rgba(59,207,255,0.08);
        }
        html.dark {
            --page-bg: #0F1A2F;
            --page-text: #F5F7FA;
            --bar-bg: rgba(15,26,47,0.85);
            --bar-border: rgba(59,207,255,0.16);
            --ink-soft: rgba(245,247,250,0.70);
            --ink-mute: rgba(245,247,250,0.45);
            --paper-soft: rgba(245,247,250,0.06);
            --surface-bg: rgba(21,36,65,0.55);
            --accent: #3BCFFF;
            --accent-2: #1E96E5;
            --glow-1: rgba(30,150,229,0.18);
            --glow-2: rgba(59,207,255,0.10);
        }
        body {
            font-family: 'Inter', sans-serif;
            background:
              radial-gradient(1200px 600px at 80% -10%, var(--glow-1), transparent 60%),
              radial-gradient(900px 500px at -10% 110%, var(--glow-2), transparent 60%),
              var(--page-bg);
            color: var(--page-text);
            min-height: 100vh;
        }
        .hcas-display {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            line-height: 0.95;
        }
        .hcas-eyebrow {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            font-size: 11px;
            color: rgba(59,207,255,0.75);
        }
        .hcas-hairline { box-shadow: inset 0 0 0 1px var(--bar-border); border-radius: 6px; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(59,207,255,0.25); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(59,207,255,0.45); }
    </style>
<script type="importmap">
{

    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",

  }
}

</head>

</html>
