<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Super App{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap-5.3/bootstrap.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/sweetalert2/sweetalert2.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head_extra %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block topbar %}
  <nav class="app-topbar">
    <a class="brand" href="{{ url_for('home.index') }}">
      <span class="logo">⚡</span> Super App
    </a>
    <div class="modules">
      <a href="{{ url_for('book.index') }}"     class="{% if active=='book' %}active{% endif %}">📚 Books</a>
      <a href="{{ url_for('calendar.index') }}" class="{% if active=='calendar' %}active{% endif %}">📅 Calendar</a>
      <a href="{{ url_for('calories.index') }}" class="{% if active=='calories' %}active{% endif %}">🍱 Calories</a>
      <a href="{{ url_for('summary.index') }}"  class="{% if active=='summary' %}active{% endif %}">📖 Summary</a>
      <a href="{{ url_for('vibespec.index') }}" class="{% if active=='vibespec' %}active{% endif %}">💡 VibeSpec</a>
    </div>
  </nav>
  {% endblock %}

  {% block content %}{% endblock %}

  <footer class="app-footer">
    Super App · book · calendar · calories · cs · vibespec · Offline CDN · Port 5005
  </footer>

  <script src="{{ url_for('static', filename='vendor/vue-3/vue.global.prod.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/axios/axios.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/sweetalert2/sweetalert2.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/bootstrap-5.3/bootstrap.bundle.min.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
